<div class="container">
  <div class="header">
    <h2>Categorías</h2>
    <button mat-raised-button color="primary" (click)="mostrarFormulario = true">
      <mat-icon>add</mat-icon> Nueva Categoría
    </button>
  </div>

  <mat-card *ngIf="mostrarFormulario" class="form-card">
    <mat-card-header>
      <mat-card-title>{{ editando ? 'Editar' : 'Nueva' }} Categoría</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="categoriaForm" (ngSubmit)="guardar()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Nombre</mat-label>
          <input matInput formControlName="nombre">
        </mat-form-field>
        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">Guardar</button>
          <button mat-button type="button" (click)="cancelar()">Cancelar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <table mat-table [dataSource]="categorias">
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef>Nombre</th>
        <td mat-cell *matCellDef="let c">{{ c.nombre }}</td>
      </ng-container>
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef>Acciones</th>
        <td mat-cell *matCellDef="let c">
          <button mat-icon-button color="primary" (click)="editar(c)">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="eliminar(c.id)">
            <mat-icon>delete</mat-icon>
          </button>
        </td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
