<div class="container">
  <div class="header">
    <h2>Movimientos de Stock</h2>
    <div class="header-buttons">
      <button mat-raised-button color="primary" (click)="mostrarFormulario = true; tipoMovimiento = 'entrada'">
        <mat-icon>add</mat-icon> Entrada
      </button>
      <button mat-raised-button color="warn" (click)="mostrarFormulario = true; tipoMovimiento = 'salida'">
        <mat-icon>remove</mat-icon> Salida
      </button>
    </div>
  </div>

  <mat-card *ngIf="mostrarFormulario" class="form-card">
    <mat-card-header>
      <mat-card-title>Registrar {{ tipoMovimiento | titlecase }}</mat-card-title>
    </mat-card-header>
    <mat-card-content>
      <form [formGroup]="movimientoForm" (ngSubmit)="guardar()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Producto</mat-label>
          <mat-select formControlName="producto_id">
            <mat-option *ngFor="let p of productos" [value]="p.id">
              {{ p.nombre }} (Stock: {{ p.stock }})
            </mat-option>
          </mat-select>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Cantidad</mat-label>
          <input matInput type="number" formControlName="cantidad">
        </mat-form-field>

        <div class="form-actions">
          <button mat-raised-button color="primary" type="submit">Registrar</button>
          <button mat-button type="button" (click)="cancelar()">Cancelar</button>
        </div>
      </form>
    </mat-card-content>
  </mat-card>

  <mat-card>
    <table mat-table [dataSource]="movimientos">
      <ng-container matColumnDef="producto">
        <th mat-header-cell *matHeaderCellDef>Producto</th>
        <td mat-cell *matCellDef="let m">{{ m.producto }}</td>
      </ng-container>
      <ng-container matColumnDef="tipo">
        <th mat-header-cell *matHeaderCellDef>Tipo</th>
        <td mat-cell *matCellDef="let m">
          <span [class]="m.tipo === 'entrada' ? 'entrada' : 'salida'">{{ m.tipo }}</span>
        </td>
      </ng-container>
      <ng-container matColumnDef="cantidad">
        <th mat-header-cell *matHeaderCellDef>Cantidad</th>
        <td mat-cell *matCellDef="let m">{{ m.cantidad }}</td>
      </ng-container>
      <ng-container matColumnDef="fecha">
        <th mat-header-cell *matHeaderCellDef>Fecha</th>
        <td mat-cell *matCellDef="let m">{{ m.fecha | date:'dd/MM/yyyy HH:mm' }}</td>
      </ng-container>
      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </mat-card>
</div>
